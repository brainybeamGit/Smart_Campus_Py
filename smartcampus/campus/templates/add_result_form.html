<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bulk Result Entry | Smart Campus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7fe; padding: 20px; }
        .form-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 800px; margin: auto; }
        .row-grid { display: grid; grid-template-columns: 3fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        .btn-add { background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 10px 0; }
        .btn-save { background: #004a8e; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }
        .btn-save:hover { background: #003366; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2 style="color: #004a8e; text-align: center;"><i class="fas fa-file-signature"></i> Bulk Marks Entry</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <select name="student" required>
                    <option value="">-- Select Student --</option>
                    {% for s in students %}
                    <option value="{{ s.id }}">{{ s.name }} ({{ s.roll_no }})</option>
                    {% endfor %}
                </select>
                <input type="number" name="semester" placeholder="Semester (e.g. 1)" required>
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

            <div id="subject-list">
                <div class="row-grid">
                    <input type="text" name="subjects[]" placeholder="Subject Name" required>
                    <input type="number" name="marks[]" placeholder="Obtained" required>
                    <input type="number" name="totals[]" value="100" placeholder="Total">
                </div>
            </div>

            <button type="button" class="btn-add" onclick="addNewRow()">
                <i class="fas fa-plus"></i> Add Another Subject
            </button>

            <button type="submit" class="btn-save">SUBMIT REPORT CARD</button>
        </form>
    </div>

    <script>
        function addNewRow() {
            const container = document.getElementById('subject-list');
            const div = document.createElement('div');
            div.className = 'row-grid';
            div.innerHTML = `
                <input type="text" name="subjects[]" placeholder="Subject Name" required>
                <input type="number" name="marks[]" placeholder="Obtained" required>
                <input type="number" name="totals[]" value="100" placeholder="Total">
            `;
            container.appendChild(div);
        }
    </script>
</body>
</html>
