<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mess Wallet | Smart Campus</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #6366f1; --sidebar-bg: #111827; --success: #10b981; --danger: #ef4444; --dark: #0f172a;
        }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f8fafc; display: flex; }
        .sidebar { width: 260px; background: var(--sidebar-bg); height: 100vh; position: fixed; color: white; }
        .sidebar-header { padding: 40px 25px; display: flex; align-items: center; gap: 15px; font-size: 22px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-menu { padding: 20px 0; }
        .sidebar a { display: flex; align-items: center; color: #94a3b8; padding: 14px 25px; text-decoration: none; transition: 0.3s; }
        .sidebar a.active { background: rgba(16, 185, 129, 0.1); color: white; border-left: 4px solid var(--success); }
        .content { margin-left: 260px; width: 100%; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .mess-card { max-width: 500px; width: 100%; background: white; padding: 35px; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); text-align: center; border-bottom: 8px solid var(--success); }
        #reader { width: 100% !important; border-radius: 25px; overflow: hidden; background: #000; margin: 20px 0; border: 4px solid #f1f5f9; }
        .status-box { margin-top: 20px; padding: 20px; border-radius: 20px; display: none; }
        .success-mode { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .error-mode { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .price-tag { background: #ecfdf5; color: #10b981; padding: 5px 15px; border-radius: 10px; font-weight: 700; font-size: 14px; }
        .history-container { width: 100%; max-width: 500px; margin-top: 30px; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div style="background:var(--success); width:35px; height:35px; border-radius:8px; display:flex; align-items:center; justify-content:center;"><i class="fas fa-utensils" style="color:white; font-size:18px;"></i></div>
        <span>SmartCampus</span>
    </div>
    <div class="sidebar-menu">
        <a href="{% url 'home' %}"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
        <a href="{% url 'qr_scanner' %}"><i class="fas fa-qrcode"></i> <span>Attendance</span></a>
        <a href="#" class="active"><i class="fas fa-wallet"></i> <span>Mess Wallet</span></a>
    </div>
</div>

<div class="content">
    <div class="mess-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;"><span class="price-tag">MEAL COST: ₹50.00</span><i class="fas fa-wifi" style="color: var(--success);"></i></div>
        <h2 style="margin:0; font-weight:700;">Mess <span style="color: var(--success);">Wallet</span></h2>
        <div id="reader"></div>
        <div id="status-display" class="status-box"></div>
    </div>

    <div class="history-container">
        <h3 style="margin:0 0 15px 0; font-size:18px; color:var(--dark);"><i class="fas fa-history" style="color:var(--primary);"></i> Recent Scans</h3>
        <div id="history-list">
            {% for tx in history %}
            <div class="tx-item">
                <div>
                    <div style="font-weight:600; font-size:14px;">{{ tx.student.name }}</div>
                    <small style="color:#94a3b8;">{{ tx.date|date:"h:i A" }}</small>
                </div>
                <div style="color:var(--danger); font-weight:700;">-₹50.00</div>
            </div>
            {% empty %}
            <p id="no-tx" style="text-align:center; color:#94a3b8; font-size:14px;">No transactions today</p>
            {% endfor %}
        </div>
    </div>
</div>

<script>
    let isProcessing = false;
    function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;
        const statusDisplay = document.getElementById('status-display');
        const historyList = document.getElementById('history-list');
        const noTx = document.getElementById('no-tx');
        
        statusDisplay.style.display = "block";
        statusDisplay.className = "status-box"; 
        statusDisplay.innerHTML = "<b>🔄 Scanning: " + decodedText + "</b><br>Processing...";

        fetch("{% url 'mess_payment_api' %}", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded", "X-CSRFToken": "{{ csrf_token }}" },
            body: "student_id=" + decodedText
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                statusDisplay.className = "status-box success-mode";
                statusDisplay.innerHTML = `<h3>✅ Payment Done!</h3><p>Balance Left: ₹${data.balance}</p>`;
                
                if(noTx) noTx.remove();
                const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const newTx = `<div class="tx-item"><div><div style="font-weight:600; font-size:14px;">ID: ${decodedText}</div><small style="color:#94a3b8;">${now}</small></div><div style="color:var(--danger); font-weight:700;">-₹50.00</div></div>`;
                historyList.insertAdjacentHTML('afterbegin', newTx);
            } else {
                statusDisplay.className = "status-box error-mode";
                statusDisplay.innerHTML = `<h3>❌ Fail: ${data.message}</h3>`;
            }
            setTimeout(() => { statusDisplay.style.display = "none"; isProcessing = false; }, 3000);
        });
    }
    let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);
</script>
</body>
</html>
