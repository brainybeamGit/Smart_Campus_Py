<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Smart Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ksv-blue: #004a8e;
            --ksv-yellow: #febd17;
            --glass: rgba(255, 255, 255, 0.12);
        }

        body {
            margin: 0; font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0, 74, 142, 0.85), rgba(0, 42, 82, 0.95)), 
                        url('https://images.pexels.com/photos/256490/pexels-photo-256490.jpeg?auto=compress&cs=tinysrgb&w=1280');
            background-size: cover; background-position: center;
            background-attachment: fixed;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 30px 15px;
        }

        .register-card {
            background: var(--glass); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; 
            width: 550px;
            border: 1px solid rgba(255, 255, 255, 0.2); 
            color: white; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            animation: slideUp 0.6s ease-out;
        }

        .header-area { text-align: center; margin-bottom: 30px; }
        .logo-icon { 
            width: 60px; height: 60px; background: var(--ksv-yellow);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; color: var(--ksv-blue); font-size: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 { margin: 0; font-weight: 700; font-size: 26px; letter-spacing: 1px; }
        p.tagline { color: #ddd; font-size: 14px; margin: 5px 0 0; }

        /* Form Layout */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px 20px; }
        .full-width { grid-column: span 2; }

        .input-group { position: relative; }
        .input-group label { 
            display: block; font-size: 11px; font-weight: 600; 
            color: var(--ksv-yellow); margin-bottom: 6px; margin-left: 10px;
            text-transform: uppercase;
        }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { 
            position: absolute; left: 15px; top: 50%; 
            transform: translateY(-50%); color: var(--ksv-blue); font-size: 14px; 
        }

        input, select {
            width: 100%; padding: 12px 15px 12px 42px; 
            border-radius: 12px; border: none;
            background: rgba(255, 255, 255, 0.95); 
            box-sizing: border-box; font-size: 13px;
            outline: none; color: #333; font-weight: 500;
            transition: 0.3s;
        }

        input:focus, select:focus {
            background: #fff;
            box-shadow: 0 0 0 3px var(--ksv-yellow);
        }

        .register-btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: var(--ksv-yellow); color: var(--ksv-blue); 
            font-weight: 700; font-size: 16px; cursor: pointer;
            transition: 0.3s; margin-top: 25px; text-transform: uppercase;
            letter-spacing: 1px;
        }

        .register-btn:hover { 
            background: #fff; transform: translateY(-2px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .login-link { text-align: center; margin-top: 25px; font-size: 14px; color: #eee; }
        .login-link a { color: var(--ksv-yellow); text-decoration: none; font-weight: 600; }
        .login-link a:hover { text-decoration: underline; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .register-card { width: 95%; padding: 30px 20px; }
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="header-area">
            <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
            <h2>Create Student Account</h2>
            <p class="tagline">Join the Smart Campus Digital Network</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div style="background: rgba(255, 60, 60, 0.25); border-left: 5px solid #ff4d4d; color: #fff; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px;">
                    <i class="fas fa-exclamation-triangle"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-grid">
                <div class="input-group full-width">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" name="full_name" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-at"></i>
                        <input type="text" name="username" placeholder="johndoe123" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Roll Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" name="roll_no" placeholder="e.g. 22CS101" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" placeholder="john@college.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" name="phone" placeholder="+91 98765 43210">
                    </div>
                </div>

                <div class="input-group full-width">
                    <label>Course</label>
                    <div class="input-wrapper">
                        <i class="fas fa-university"></i>
                        <select name="course">
                            <option value="">— Select Course —</option>
                            {% for c in courses %}
                                <option value="{{ c.course_name }}">{{ c.course_name }} ({{ c.course_code }})</option>
                            {% empty %}
                                <option value="" disabled>No courses available yet</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-shield-alt"></i>
                        <input type="password" name="confirm_password" placeholder="••••••••" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="register-btn">Create My Account</button>
        </form>

        <div class="login-link">
            Already a member? <a href="{% url 'login' %}">Log In</a>
        </div>
    </div>

</body>
</html>
