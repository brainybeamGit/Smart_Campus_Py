<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Changed | Smart Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ksv-blue: #004a8e; --ksv-yellow: #febd17; }
        body { 
            margin: 0; font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0, 74, 142, 0.85), rgba(0, 42, 82, 0.9));
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .card { 
            background: rgba(139, 137, 137, 0.15); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.2); color: white; text-align: center;
        }
        .logo-circle { width: 60px; height: 60px; background: #28a745; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .logo-circle i { font-size: 30px; color: white; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 50px; background: var(--ksv-yellow); color: var(--ksv-blue); font-weight: 700; cursor: pointer; text-decoration: none; display: block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-circle"><i class="fas fa-check"></i></div>
        <h2>Password Changed!</h2>
        <p>Bhai, naya password set ho gaya hai. Ab aap login kar sakte ho.</p>
        <a href="{% url 'login' %}" class="btn">Go to Login</a>
    </div>
</body>
</html>
