<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Sent | Smart Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Aapka login wala background aur card CSS yahan aayega */
        body { background: linear-gradient(rgba(0, 74, 142, 0.85), rgba(0, 42, 82, 0.9)); font-family: 'Poppins'; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card { background: rgba(139, 137, 137, 0.15); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2); color: white; text-align: center; width: 380px; }
        .btn { background: #febd17; color: #004a8e; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Email Sent! 📧</h2>
        <p>Bhai, humne reset link bhej diya hai. Ek baar apna inbox (ya terminal) check kar lo.</p>
        <a href="{% url 'login' %}" class="btn">Back to Login</a>
    </div>
</body>
</html>
