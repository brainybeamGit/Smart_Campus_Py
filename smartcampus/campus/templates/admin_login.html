<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Smart Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --admin-dark: #0f172a;
            --admin-darker: #020617;
            --admin-gold: #febd17;
            --admin-accent: #2563eb;
            --admin-danger: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 20%, #1e293b 0%, var(--admin-darker) 70%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle grid pattern */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .admin-card {
            position: relative;
            z-index: 1;
            width: 420px;
            max-width: 92vw;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(254, 189, 23, 0.3);
            border-radius: 24px;
            padding: 42px 38px;
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 0 60px rgba(254, 189, 23, 0.08);
            animation: fadeIn 0.7s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .badge-shield {
            width: 80px;
            height: 80px;
            margin: 0 auto 18px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--admin-gold), #f59e0b);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 40px rgba(254, 189, 23, 0.4);
            position: relative;
        }
        .badge-shield i {
            font-size: 38px;
            color: var(--admin-darker);
        }

        .admin-tag {
            display: inline-block;
            background: rgba(254, 189, 23, 0.15);
            border: 1px solid rgba(254, 189, 23, 0.4);
            color: var(--admin-gold);
            font-size: 10px;
            letter-spacing: 2px;
            padding: 5px 14px;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: 700;
        }

        h1 {
            margin: 14px 0 4px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            margin: 0 0 28px;
        }

        .msg {
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 12.5px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.45s ease;
        }
        .msg-error {
            background: rgba(239, 68, 68, 0.12);
            border-left: 4px solid var(--admin-danger);
            color: #fecaca;
        }
        .msg-success {
            background: rgba(16, 185, 129, 0.12);
            border-left: 4px solid #10b981;
            color: #bbf7d0;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }
        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--admin-gold);
            font-size: 15px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.25s;
            font-family: inherit;
        }
        .input-group input:focus {
            border-color: var(--admin-gold);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(254, 189, 23, 0.15);
        }
        .input-group input::placeholder { color: #64748b; }

        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 6px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--admin-gold), #f59e0b);
            color: var(--admin-darker);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(254, 189, 23, 0.25);
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(254, 189, 23, 0.4);
        }

        .divider {
            margin: 26px 0 14px;
            text-align: center;
            font-size: 11px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .back-student {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 12.5px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.25s;
        }
        .back-student:hover {
            color: white;
            border-color: rgba(254, 189, 23, 0.4);
            background: rgba(255, 255, 255, 0.03);
        }

        .footer-note {
            margin-top: 22px;
            text-align: center;
            font-size: 10.5px;
            color: #475569;
            letter-spacing: 0.5px;
        }
        .footer-note i { color: var(--admin-gold); }
    </style>
</head>
<body>

    <div class="admin-card">
        <div class="badge-shield">
            <i class="fas fa-user-shield"></i>
        </div>

        <div style="text-align: center;">
            <span class="admin-tag">Restricted Access</span>
        </div>
        <h1>Master Admin Portal</h1>
        <p class="subtitle">Authorized staff sign-in for SmartCampus Control Center</p>

        {% if messages %}
            {% for message in messages %}
                <div class="msg {% if message.tags == 'success' %}msg-success{% else %}msg-error{% endif %}">
                    <i class="fas fa-{% if message.tags == 'success' %}check-circle{% else %}exclamation-triangle{% endif %}"></i>
                    <span>{{ message }}</span>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <i class="fas fa-id-badge"></i>
                <input type="text" name="username" placeholder="Admin Username" autocomplete="username" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Admin Password" autocomplete="current-password" required>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> &nbsp; Access Dashboard
            </button>
        </form>

        <div class="divider">Not an Admin?</div>

        <a href="{% url 'login' %}" class="back-student">
            <i class="fas fa-arrow-left"></i> Back to Student Login
        </a>

        <p class="footer-note">
            <i class="fas fa-shield-alt"></i> &nbsp; Secured by SmartCampus &middot; All access is logged
        </p>
    </div>

</body>
</html>
