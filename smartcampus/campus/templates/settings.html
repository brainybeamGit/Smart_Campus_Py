<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings | Smart Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; padding: 40px; }
        .settings-card { 
            max-width: 600px; margin: auto; background: white; 
            padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        .user-info { text-align: center; margin-bottom: 30px; }
        .user-info i { font-size: 50px; color: #6366f1; }
        .info-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        .btn-back { display: inline-block; text-decoration: none; color: #6366f1; font-weight: 600; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="settings-card">
        <a href="{% url 'home' %}" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        <div class="user-info">
            <i class="fas fa-user-circle"></i>
            <h2>Admin Profile</h2>
        </div>
        <div class="info-row">
            <span>Username:</span>
            <strong>{{ request.user.username }}</strong>
        </div>
        <div class="info-row">
            <span>Email:</span>
            <strong>{{ request.user.email|default:"Not Set" }}</strong>
        </div>
        <div class="info-row">
            <span>Role:</span>
            <strong style="color: green;">Administrator</strong>
        </div>
        <br>
        <p style="text-align: center; color: #94a3b8; font-size: 12px;">Bhai, password change karne ke liye Django Admin use karein.</p>
    </div>
</body>
</html>
