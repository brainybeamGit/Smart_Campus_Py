<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ event.title }} | Smart Campus Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f9; margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 50px auto; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .back-btn { text-decoration: none; color: #004a8e; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { color: #febd17; }
        .event-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; margin-top: 30px; }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .event-grid { grid-template-columns: 1fr; }
        }

        .input-style { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-top: 8px; box-sizing: border-box; }
        .submit-btn { width: 100%; background: #febd17; color: #004a8e; border: none; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .submit-btn:hover { background: #e6a800; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div style="text-align: center; margin-top: 20px;">
        <h1 style="color: #004a8e; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">{{ event.title }}</h1>
        <div style="width: 80px; height: 5px; background: #febd17; margin: 0 auto; border-radius: 5px;"></div>
    </div>

    <div class="event-grid">
        
        <div>
            <div style="background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                <img src="{{ event.image.url }}" alt="{{ event.title }}" 
                     style="width: 100%; border-radius: 15px; display: block;">
            </div>

            <div style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-top: 30px;">
                <h3 style="color: #004a8e; margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px;">
                    <i class="fas fa-info-circle"></i> Event Details
                </h3>
                <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px;">
                    <p><strong><i class="fas fa-calendar-alt" style="color: #febd17;"></i> Date:</strong> {{ event.date }}</p>
                    <p><strong><i class="fas fa-map-marker-alt" style="color: #febd17;"></i> Location:</strong> {{ event.location }}</p>
                    <p><strong><i class="fas fa-clock" style="color: #febd17;"></i> Time:</strong> {{ event.time }}</p>
                </div>
                <h4 style="color: #333;">About this Event</h4>
                <p style="color: #555; line-height: 1.8; font-size: 15px;">{{ event.description }}</p>
            </div>
        </div>

        <div style="position: sticky; top: 20px; align-self: start;">
            <div style="background: #004a8e; color: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,74,142,0.3);">
                <h3 style="text-align: center; margin-top: 0; font-size: 24px;">Register Now</h3>
                <p style="text-align: center; opacity: 0.8; font-size: 14px; margin-bottom: 25px;">Fill your details to participate</p>
                
                <form action="{% url 'register_event' event.id %}" method="POST">
                    {% csrf_token %}
                    
                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 14px;">Full Name</label>
                        <input type="text" name="name" class="input-style" placeholder="Enter your full name" required>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 14px;">Roll Number</label>
                        <input type="text" name="roll" class="input-style" placeholder="e.g. MCA-2024-01" required>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 14px;">Email Address</label>
                        <input type="email" name="email" class="input-style" placeholder="yourname@gmail.com" required>
                    </div>

                    <div style="margin-bottom: 25px;">
                        <label style="font-size: 14px;">Select Branch</label>
                        <select name="branch" class="input-style">
                            <option value="MCA">MCA</option>
                            <option value="B.Tech">B.Tech</option>
                            <option value="BCA">BCA</option>
                            <option value="MBA">MBA</option>
                        </select>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="fas fa-paper-plane"></i> Confirm My Slot
                    </button>
                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
