<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Subject | Smart Campus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-blue-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 border-t-4 border-yellow-500">
        <h2 class="text-2xl font-bold text-gray-800 text-center">Add Subject</h2>
        <p class="text-center text-blue-600 font-semibold mb-6">Course: {{ course.course_name }}</p>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Subject Name</label>
                <input type="text" name="subject_name" placeholder="e.g. Python Programming" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-yellow-400" required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Subject Code</label>
                <input type="text" name="subject_code" placeholder="e.g. CS-301" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-yellow-400" required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Academic Credits</label>
                <input type="number" name="credits" value="4" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-600 text-blue-900 font-bold py-3 rounded-lg shadow-lg transition transform active:scale-95">
                <i class="fas fa-save mr-2"></i>Add Subject to {{ course.course_name }}
            </button>

            <a href="{% url 'courses_page' %}" class="block text-center text-gray-500 hover:text-red-500 text-sm mt-4">
                <i class="fas fa-times mr-1"></i> Cancel
            </a>
        </form>
    </div>
</body>
</html>
